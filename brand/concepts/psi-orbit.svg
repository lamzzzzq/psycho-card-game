<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Psi Orbit logo">
  <!-- 方案 C · Psi Orbit：中心 Ψ + 圆形轨道上散布小麻将牌/圆点（数量仅示意，未来任意维度都合适）。徽记 / 可做旋转动效。 -->
  <defs>
    <linearGradient id="orbitPsi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8b46a"/>
      <stop offset="1" stop-color="#b3873f"/>
    </linearGradient>
  </defs>

  <!-- 轨道（虚线圆环，暗示流动、不锁数量） -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="#c39a52" stroke-width="2"
          stroke-dasharray="3 7" stroke-linecap="round" opacity="0.55"/>

  <!-- 轨道上的元素：3 枚小麻将牌 + 3 个小圆点交替（数量只是示意） -->
  <!-- 顶 -->
  <rect x="53.5" y="8.5" width="13" height="17" rx="4" fill="#fdf9f0" stroke="#c39a52" stroke-width="2"/>
  <!-- 左下 -->
  <rect x="15" y="76" width="13" height="17" rx="4" fill="#fdf9f0" stroke="#c39a52" stroke-width="2" transform="rotate(-52 21.5 84.5)"/>
  <!-- 右下 -->
  <rect x="92" y="76" width="13" height="17" rx="4" fill="#fdf9f0" stroke="#c39a52" stroke-width="2" transform="rotate(52 98.5 84.5)"/>
  <!-- 圆点 -->
  <circle cx="98.5" cy="35.5" r="4" fill="#cf7350"/>
  <circle cx="21.5" cy="35.5" r="4" fill="#6f8f55"/>
  <circle cx="60" cy="104" r="4" fill="#c39a52"/>

  <!-- 中心 Ψ -->
  <g fill="none" stroke="url(#orbitPsi)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
     transform="translate(27,27) scale(0.66)">
    <path d="M35 30 L35 55 Q35 70 50 70 Q65 70 65 55 L65 30"/>
    <path d="M50 26 L50 84"/>
    <path d="M40 84 L60 84"/>
  </g>
</svg>
